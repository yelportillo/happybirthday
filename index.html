<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Premium Edition 🎂</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="card-container">
        <div class="card" id="card">
            <div class="card-front">
                <div class="front-content">
                    <div class="icon-container">
                        <div class="cake">🎂</div>
                    </div>
                    <h1 class="title" id="card-title">Happy Birthday</h1>
                    <div class="divider"></div>
                    <p class="subtitle" id="card-subtitle">A curated celebration awaits</p>
                    <div class="tap-indicator" id="card-indicator">Click to open</div>
                </div>
            </div>
            <div class="card-inside">
                <div class="inside-content">
                    <h2 class="inside-title">Happy Birthday! 🎉</h2>
                    <p class="inside-text">Wishing you a wonderful day filled with joy, laughter, and everything that makes you smile.</p>
                    <div class="wish">
                        May the year ahead be full of happiness and great memories! 🌟
                    </div>
                    <button id="confetti-btn">Celebrate Again 🎊</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="birthday-music" loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
